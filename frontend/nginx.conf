server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /glossary {
        try_files /glossary/index.html =404;
    }

    location = /about {
        try_files /about/index.html =404;
    }

    location = /privacy {
        try_files /privacy/index.html =404;
    }

    location = /legal {
        try_files /legal/index.html =404;
    }

    location = /site.webmanifest {
        default_type application/manifest+json;
        try_files $uri =404;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/(auth|verify-email|forgot-password|reset-password|result|history|achievements|profile|admin)(/|$) {
        try_files $uri $uri/ /noindex.html;
    }

    location ~ ^/(reading|feedback)(/|$) {
        try_files $uri $uri/ /noindex.html;
    }

    location ~ ^/payment/ {
        try_files $uri $uri/ /noindex.html;
    }

    location ~ ^/glossary/.+ {
        try_files $uri $uri/ /noindex.html;
    }

    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpe?g|webp|ico|webmanifest)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }
}
