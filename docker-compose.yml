# Local development compose. Production server deployment uses docker-compose.prod.yml.
services:
  postgres:
    image: postgres:17-alpine
    container_name: fv-postgres
    environment:
      POSTGRES_USER: future_viewer
      POSTGRES_PASSWORD: future_viewer_dev
      POSTGRES_DB: future_viewer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U future_viewer -d future_viewer"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fv-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=future_viewer;Username=future_viewer;Password=future_viewer_dev
      Jwt__Secret: ${JWT_SECRET:-dev-secret-please-change-me-in-prod-32chars-minimum}
      Jwt__Issuer: future-viewer
      Jwt__Audience: future-viewer
      AI__Provider: ${AI_PROVIDER:-OpenAI}
      OpenAI__ApiKey: ${OPENAI_API_KEY:-}
      OpenAI__Model: ${OPENAI_MODEL:-gpt-4o}
      OpenAI__BaseUrl: ${OPENAI_BASE_URL:-}
      DeepSeek__ApiKey: ${DEEPSEEK_API_KEY:-}
      DeepSeek__Model: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      DeepSeek__BaseUrl: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      Telegram__BotToken: ${TELEGRAM_BOT_TOKEN:-}
      Telegram__BotUsername: ${TELEGRAM_BOT_USERNAME:-FutureViewerBot}
      Telegram__SiteUrl: ${TELEGRAM_SITE_URL:-http://localhost:5173}
      Support__Email: ${SUPPORT_EMAIL:-support@vualgryaduschego.ru}
      Email__Host: ${EMAIL_HOST:-}
      Email__Port: ${EMAIL_PORT:-587}
      Email__Username: ${EMAIL_USERNAME:-}
      Email__Password: ${EMAIL_PASSWORD:-}
      Email__From: ${EMAIL_FROM:-no-reply@vualgryaduschego.ru}
      Email__UseSsl: ${EMAIL_USE_SSL:-true}
      Email__FrontendUrl: ${EMAIL_FRONTEND_URL:-http://localhost:5173}
    ports:
      - "5050:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: fv-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5050
      VITE_MERCHANT_SERVICE_NAME: ${VITE_MERCHANT_SERVICE_NAME:-Future Viewer}
      VITE_MERCHANT_OWNER_NAME: ${VITE_MERCHANT_OWNER_NAME:-Дунецев Александр Дмитриевич}
      VITE_MERCHANT_TAX_STATUS: ${VITE_MERCHANT_TAX_STATUS:-самозанятый, плательщик налога на профессиональный доход}
      VITE_MERCHANT_INN: ${VITE_MERCHANT_INN:-592108465422}
      VITE_MERCHANT_PHONE: ${VITE_MERCHANT_PHONE:-79967669613}
      VITE_MERCHANT_EMAIL: ${VITE_MERCHANT_EMAIL:-duntsev010@mail.ru}
      VITE_MERCHANT_POSTAL_ADDRESS: ${VITE_MERCHANT_POSTAL_ADDRESS:-duntsev010@mail.ru}
      VITE_PAID_PRODUCT_TITLE: ${VITE_PAID_PRODUCT_TITLE:-Подписка Future Viewer Pro}
      VITE_PAID_PRODUCT_PRICE: ${VITE_PAID_PRODUCT_PRICE:-300 ₽}
      VITE_PAID_PRODUCT_PERIOD: ${VITE_PAID_PRODUCT_PERIOD:-1 месяц}
      VITE_PAID_PRODUCT_DESCRIPTION: ${VITE_PAID_PRODUCT_DESCRIPTION:-Цифровая услуга доступа к безлимитным Таро-раскладам в онлайн-сервисе Future Viewer.}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
