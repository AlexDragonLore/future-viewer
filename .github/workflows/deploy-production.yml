name: deploy-production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    env:
      DEPLOY_BRANCH: ${{ github.ref_name }}
      IMAGE_TAG: ${{ github.sha }}
      PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
      PRODUCTION_PORT: ${{ vars.PRODUCTION_PORT || '22' }}
      PRODUCTION_APP_DIR: ${{ vars.PRODUCTION_APP_DIR || '/opt/future-viewer' }}
      PRODUCTION_DEPLOY_USER: ${{ vars.PRODUCTION_DEPLOY_USER || 'deploy' }}
      PRODUCTION_ROOT_USER: ${{ vars.PRODUCTION_ROOT_USER || 'root' }}
      PRODUCTION_DEPLOY_SSH_KEY: ${{ secrets.PRODUCTION_DEPLOY_SSH_KEY }}
      PRODUCTION_ROOT_SSH_KEY: ${{ secrets.PRODUCTION_ROOT_SSH_KEY }}
      PRODUCTION_HEALTH_URL: ${{ vars.PRODUCTION_HEALTH_URL || 'https://alex-taro.ru/health' }}
      VITE_API_URL: ${{ vars.VITE_API_URL || '' }}
      VITE_MERCHANT_SERVICE_NAME: ${{ vars.VITE_MERCHANT_SERVICE_NAME || 'Future Viewer' }}
      VITE_MERCHANT_OWNER_NAME: ${{ vars.VITE_MERCHANT_OWNER_NAME || 'Дунецев Александр Дмитриевич' }}
      VITE_MERCHANT_TAX_STATUS: ${{ vars.VITE_MERCHANT_TAX_STATUS || 'самозанятый, плательщик налога на профессиональный доход' }}
      VITE_MERCHANT_INN: ${{ vars.VITE_MERCHANT_INN || '592108465422' }}
      VITE_MERCHANT_PHONE: ${{ vars.VITE_MERCHANT_PHONE || '79967669613' }}
      VITE_MERCHANT_EMAIL: ${{ vars.VITE_MERCHANT_EMAIL || 'duntsev010@mail.ru' }}
      VITE_MERCHANT_POSTAL_ADDRESS: ${{ vars.VITE_MERCHANT_POSTAL_ADDRESS || 'duntsev010@mail.ru' }}
      VITE_PAID_PRODUCT_TITLE: ${{ vars.VITE_PAID_PRODUCT_TITLE || 'Доступ Future Viewer Pro' }}
      VITE_PAID_PRODUCT_PRICE: ${{ vars.VITE_PAID_PRODUCT_PRICE || '300 ₽' }}
      VITE_PAID_PRODUCT_PERIOD: ${{ vars.VITE_PAID_PRODUCT_PERIOD || '30 дней' }}
      VITE_PAID_PRODUCT_DESCRIPTION: ${{ vars.VITE_PAID_PRODUCT_DESCRIPTION || 'Цифровая услуга доступа к безлимитным Таро-раскладам в онлайн-сервисе Future Viewer без автопродления.' }}
      PAYMENT_PROVIDER: ${{ vars.PAYMENT_PROVIDER || 'Yukassa' }}
      YUKASSA_SHOP_ID: ${{ secrets.YUKASSA_SHOP_ID }}
      YUKASSA_SECRET_KEY: ${{ secrets.YUKASSA_SECRET_KEY }}
      YUKASSA_CURRENCY: ${{ vars.YUKASSA_CURRENCY || 'RUB' }}
      YUKASSA_MONTHLY_PRICE_AMOUNT: ${{ vars.YUKASSA_MONTHLY_PRICE_AMOUNT || '300' }}
      YUKASSA_API_BASE_URL: ${{ vars.YUKASSA_API_BASE_URL || 'https://api.yookassa.ru/v3/' }}
      YOOMONEY_RECEIVER: ${{ secrets.YOOMONEY_RECEIVER }}
      YOOMONEY_NOTIFICATION_SECRET: ${{ secrets.YOOMONEY_NOTIFICATION_SECRET }}
      YOOMONEY_QUICKPAY_URL: ${{ vars.YOOMONEY_QUICKPAY_URL || 'https://yoomoney.ru/quickpay/confirm' }}
      YOOMONEY_QUICKPAY_FORM: ${{ vars.YOOMONEY_QUICKPAY_FORM || 'button' }}
      YOOMONEY_PAYMENT_TYPE: ${{ vars.YOOMONEY_PAYMENT_TYPE || 'AC' }}
      YOOMONEY_CURRENCY_CODE: ${{ vars.YOOMONEY_CURRENCY_CODE || '643' }}
      YOOMONEY_MONTHLY_PRICE_AMOUNT: ${{ vars.YOOMONEY_MONTHLY_PRICE_AMOUNT || '300' }}
      YOOMONEY_TARGETS: ${{ vars.YOOMONEY_TARGETS || 'Доступ Future Viewer Pro' }}
    steps:
      - name: Check deploy configuration
        id: config
        run: |
          set -Eeuo pipefail
          missing=0
          if [ -z "$PRODUCTION_HOST" ]; then echo "::warning::PRODUCTION_HOST secret is required"; missing=1; fi
          if [ -z "$PRODUCTION_DEPLOY_SSH_KEY" ]; then echo "::warning::PRODUCTION_DEPLOY_SSH_KEY secret is required"; missing=1; fi
          if [ -z "$PRODUCTION_ROOT_SSH_KEY" ]; then echo "::warning::PRODUCTION_ROOT_SSH_KEY secret is required"; missing=1; fi
          if [ -z "$DEPLOY_BRANCH" ]; then echo "::warning::DEPLOY_BRANCH is empty"; missing=1; fi

          if [ "$missing" -eq 1 ]; then
            echo "deploy_ready=false" >> "$GITHUB_OUTPUT"
            echo "Production deploy skipped because required SSH configuration is missing."
          else
            echo "deploy_ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.config.outputs.deploy_ready == 'true'

      - name: Build backend image
        if: steps.config.outputs.deploy_ready == 'true'
        run: |
          set -Eeuo pipefail
          docker build \
            --tag "future-viewer-backend:$IMAGE_TAG" \
            ./backend

      - name: Build frontend image
        if: steps.config.outputs.deploy_ready == 'true'
        run: |
          set -Eeuo pipefail
          docker build \
            --build-arg "VITE_API_URL=$VITE_API_URL" \
            --build-arg "VITE_MERCHANT_SERVICE_NAME=$VITE_MERCHANT_SERVICE_NAME" \
            --build-arg "VITE_MERCHANT_OWNER_NAME=$VITE_MERCHANT_OWNER_NAME" \
            --build-arg "VITE_MERCHANT_TAX_STATUS=$VITE_MERCHANT_TAX_STATUS" \
            --build-arg "VITE_MERCHANT_INN=$VITE_MERCHANT_INN" \
            --build-arg "VITE_MERCHANT_PHONE=$VITE_MERCHANT_PHONE" \
            --build-arg "VITE_MERCHANT_EMAIL=$VITE_MERCHANT_EMAIL" \
            --build-arg "VITE_MERCHANT_POSTAL_ADDRESS=$VITE_MERCHANT_POSTAL_ADDRESS" \
            --build-arg "VITE_PAID_PRODUCT_TITLE=$VITE_PAID_PRODUCT_TITLE" \
            --build-arg "VITE_PAID_PRODUCT_PRICE=$VITE_PAID_PRODUCT_PRICE" \
            --build-arg "VITE_PAID_PRODUCT_PERIOD=$VITE_PAID_PRODUCT_PERIOD" \
            --build-arg "VITE_PAID_PRODUCT_DESCRIPTION=$VITE_PAID_PRODUCT_DESCRIPTION" \
            --target prod \
            --tag "future-viewer-frontend:$IMAGE_TAG" \
            ./frontend

      - name: Pack images
        if: steps.config.outputs.deploy_ready == 'true'
        run: |
          set -Eeuo pipefail
          docker save "future-viewer-backend:$IMAGE_TAG" "future-viewer-frontend:$IMAGE_TAG" \
            | gzip -1 > /tmp/future-viewer-images.tar.gz

      - name: Configure SSH
        if: steps.config.outputs.deploy_ready == 'true'
        run: |
          set -Eeuo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PRODUCTION_DEPLOY_SSH_KEY" > ~/.ssh/future_viewer_deploy
          printf '%s\n' "$PRODUCTION_ROOT_SSH_KEY" > ~/.ssh/future_viewer_root
          chmod 600 ~/.ssh/future_viewer_deploy ~/.ssh/future_viewer_root
          ssh-keyscan -p "$PRODUCTION_PORT" "$PRODUCTION_HOST" >> ~/.ssh/known_hosts

      - name: Prepare server Docker storage
        if: steps.config.outputs.deploy_ready == 'true'
        run: |
          set -Eeuo pipefail
          ssh \
            -i ~/.ssh/future_viewer_root \
            -p "$PRODUCTION_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "$PRODUCTION_ROOT_USER@$PRODUCTION_HOST" \
            "bash -s" <<'REMOTE'
          set -Eeuo pipefail
          rm -f /tmp/future-viewer-images-*.tar.gz
          docker system prune -af
          df -h /
          REMOTE

      - name: Update server repository
        if: steps.config.outputs.deploy_ready == 'true'
        run: |
          set -Eeuo pipefail
          ssh \
            -i ~/.ssh/future_viewer_deploy \
            -p "$PRODUCTION_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "$PRODUCTION_DEPLOY_USER@$PRODUCTION_HOST" \
            "DEPLOY_BRANCH='$DEPLOY_BRANCH' APP_DIR='$PRODUCTION_APP_DIR' bash -s" <<'REMOTE'
          set -Eeuo pipefail
          cd "$APP_DIR"
          git fetch origin "$DEPLOY_BRANCH:refs/remotes/origin/$DEPLOY_BRANCH"

          current_branch="$(git rev-parse --abbrev-ref HEAD)"
          if [ "$current_branch" != "$DEPLOY_BRANCH" ]; then
            git switch "$DEPLOY_BRANCH" 2>/dev/null || git switch -c "$DEPLOY_BRANCH" "origin/$DEPLOY_BRANCH"
          fi

          git merge --ff-only "origin/$DEPLOY_BRANCH"
          REMOTE

      - name: Upload images to server
        if: steps.config.outputs.deploy_ready == 'true'
        run: |
          set -Eeuo pipefail
          scp \
            -i ~/.ssh/future_viewer_root \
            -P "$PRODUCTION_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            /tmp/future-viewer-images.tar.gz \
            "$PRODUCTION_ROOT_USER@$PRODUCTION_HOST:/tmp/future-viewer-images-$IMAGE_TAG.tar.gz"

      - name: Upload production env overrides
        if: steps.config.outputs.deploy_ready == 'true'
        run: |
          set -Eeuo pipefail
          if { [ -z "$YUKASSA_SHOP_ID" ] && [ -n "$YUKASSA_SECRET_KEY" ]; } || { [ -n "$YUKASSA_SHOP_ID" ] && [ -z "$YUKASSA_SECRET_KEY" ]; }; then
            echo "::warning::Set both YUKASSA_SHOP_ID and YUKASSA_SECRET_KEY secrets for production payments."
          fi
          case "$PAYMENT_PROVIDER" in
            YooMoney|yoomoney)
              if [ -z "$YOOMONEY_RECEIVER" ] || [ -z "$YOOMONEY_NOTIFICATION_SECRET" ]; then
                echo "::warning::Set YOOMONEY_RECEIVER and YOOMONEY_NOTIFICATION_SECRET secrets when PAYMENT_PROVIDER=YooMoney."
              fi
              ;;
          esac

          umask 077
          overlay="$(mktemp)"
          {
            printf 'PAYMENT_PROVIDER=%s\n' "$PAYMENT_PROVIDER"
            if [ -n "$YUKASSA_SHOP_ID" ]; then
              printf 'YUKASSA_SHOP_ID=%s\n' "$YUKASSA_SHOP_ID"
            fi
            if [ -n "$YUKASSA_SECRET_KEY" ]; then
              printf 'YUKASSA_SECRET_KEY=%s\n' "$YUKASSA_SECRET_KEY"
            fi
            printf 'YUKASSA_CURRENCY=%s\n' "$YUKASSA_CURRENCY"
            printf 'YUKASSA_MONTHLY_PRICE_AMOUNT=%s\n' "$YUKASSA_MONTHLY_PRICE_AMOUNT"
            printf 'YUKASSA_API_BASE_URL=%s\n' "$YUKASSA_API_BASE_URL"
            if [ -n "$YOOMONEY_RECEIVER" ]; then
              printf 'YOOMONEY_RECEIVER=%s\n' "$YOOMONEY_RECEIVER"
            fi
            if [ -n "$YOOMONEY_NOTIFICATION_SECRET" ]; then
              printf 'YOOMONEY_NOTIFICATION_SECRET=%s\n' "$YOOMONEY_NOTIFICATION_SECRET"
            fi
            printf 'YOOMONEY_QUICKPAY_URL=%s\n' "$YOOMONEY_QUICKPAY_URL"
            printf 'YOOMONEY_QUICKPAY_FORM=%s\n' "$YOOMONEY_QUICKPAY_FORM"
            printf 'YOOMONEY_PAYMENT_TYPE=%s\n' "$YOOMONEY_PAYMENT_TYPE"
            printf 'YOOMONEY_CURRENCY_CODE=%s\n' "$YOOMONEY_CURRENCY_CODE"
            printf 'YOOMONEY_MONTHLY_PRICE_AMOUNT=%s\n' "$YOOMONEY_MONTHLY_PRICE_AMOUNT"
            printf 'YOOMONEY_TARGETS=%s\n' "$YOOMONEY_TARGETS"
          } > "$overlay"

          scp \
            -i ~/.ssh/future_viewer_root \
            -P "$PRODUCTION_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "$overlay" \
            "$PRODUCTION_ROOT_USER@$PRODUCTION_HOST:/tmp/future-viewer-env-overrides-$IMAGE_TAG"
          rm -f "$overlay"

      - name: Run production deploy
        if: steps.config.outputs.deploy_ready == 'true'
        run: |
          set -Eeuo pipefail
          ssh \
            -i ~/.ssh/future_viewer_root \
            -p "$PRODUCTION_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "$PRODUCTION_ROOT_USER@$PRODUCTION_HOST" \
            "IMAGE_TAG='$IMAGE_TAG' APP_DIR='$PRODUCTION_APP_DIR' bash -s" <<'REMOTE'
          set -Eeuo pipefail
          cd "$APP_DIR"
          env_file="/opt/fv-app/.env.production"
          override_file="/tmp/future-viewer-env-overrides-$IMAGE_TAG"
          if [ -s "$override_file" ]; then
            install -d -m 700 "$(dirname "$env_file")"
            if [ ! -f "$env_file" ]; then
              install -m 600 /dev/null "$env_file"
            fi

            tmp_env="$(mktemp)"
            awk -F= '
              NR == FNR {
                key = $0
                sub(/=.*/, "", key)
                overrides[key] = $0
                order[++count] = key
                next
              }
              {
                key = $0
                sub(/=.*/, "", key)
                if (key in overrides) {
                  print overrides[key]
                  seen[key] = 1
                  next
                }
                print
              }
              END {
                for (i = 1; i <= count; i++) {
                  key = order[i]
                  if (!(key in seen)) print overrides[key]
                }
              }
            ' "$override_file" "$env_file" > "$tmp_env"
            install -m 600 "$tmp_env" "$env_file"
            rm -f "$tmp_env" "$override_file"
          fi

          docker load -i "/tmp/future-viewer-images-$IMAGE_TAG.tar.gz"
          FV_IMAGE_TAG="$IMAGE_TAG" docker compose \
            --env-file /opt/fv-app/.env.production \
            -f docker-compose.prod.yml \
            -f docker-compose.prod.prebuilt.yml \
            -p future-viewer \
            config >/dev/null
          FV_IMAGE_TAG="$IMAGE_TAG" docker compose \
            --env-file /opt/fv-app/.env.production \
            -f docker-compose.prod.yml \
            -f docker-compose.prod.prebuilt.yml \
            -p future-viewer \
            pull postgres caddy
          FV_IMAGE_TAG="$IMAGE_TAG" docker compose \
            --env-file /opt/fv-app/.env.production \
            -f docker-compose.prod.yml \
            -f docker-compose.prod.prebuilt.yml \
            -p future-viewer \
            up -d --no-build
          rm -f "/tmp/future-viewer-images-$IMAGE_TAG.tar.gz"
          docker image prune -af
          REMOTE

      - name: Verify production containers
        if: steps.config.outputs.deploy_ready == 'true'
        run: |
          set -Eeuo pipefail
          ssh \
            -i ~/.ssh/future_viewer_root \
            -p "$PRODUCTION_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "$PRODUCTION_ROOT_USER@$PRODUCTION_HOST" \
            "cd '$PRODUCTION_APP_DIR' && FV_IMAGE_TAG='$IMAGE_TAG' docker compose --env-file /opt/fv-app/.env.production -f docker-compose.prod.yml -f docker-compose.prod.prebuilt.yml -p future-viewer ps"

      - name: Verify production health
        if: steps.config.outputs.deploy_ready == 'true'
        run: |
          set -Eeuo pipefail
          for attempt in $(seq 1 20); do
            if curl -fsS "$PRODUCTION_HEALTH_URL"; then
              exit 0
            fi
            echo "Health check failed, retry $attempt/20"
            sleep 5
          done
          echo "Production health check failed after retries"
          exit 1
