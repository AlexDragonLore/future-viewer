name: backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      ASPNETCORE_ENVIRONMENT: Testing
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        working-directory: backend
        run: |
          dotnet restore src/FutureViewer.Host/FutureViewer.Host.csproj
          dotnet restore tests/FutureViewer.Domain.Tests/FutureViewer.Domain.Tests.csproj
          dotnet restore tests/FutureViewer.DomainServices.Tests/FutureViewer.DomainServices.Tests.csproj
          dotnet restore tests/FutureViewer.Integration.Tests/FutureViewer.Integration.Tests.csproj

      - name: Build
        working-directory: backend
        run: dotnet build src/FutureViewer.Host/FutureViewer.Host.csproj -c Release --no-restore

      - name: Unit tests — Domain
        working-directory: backend
        run: dotnet test tests/FutureViewer.Domain.Tests/FutureViewer.Domain.Tests.csproj -c Release --logger "console;verbosity=normal"

      - name: Unit tests — DomainServices
        working-directory: backend
        run: dotnet test tests/FutureViewer.DomainServices.Tests/FutureViewer.DomainServices.Tests.csproj -c Release --logger "console;verbosity=normal"

      - name: Integration tests
        working-directory: backend
        run: dotnet test tests/FutureViewer.Integration.Tests/FutureViewer.Integration.Tests.csproj -c Release --logger "console;verbosity=normal"
